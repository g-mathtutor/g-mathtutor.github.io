<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathTutor</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="bg-gradient"></div>

    <!-- LOGIN -->
    <main class="auth-wrapper" id="auth-wrapper">
        <div class="glass-card" id="auth-card">

            <div id="step-1" class="auth-step active">
                <h1 class="title">🎓 Math<span>Tutor</span></h1>
                <p class="subtitle">Log In for Instant Help!</p>

                <div class="custom-select" id="custom-select">

                    <div class="select-trigger" id="select-trigger">
                        <span id="selected-name-display">choose your name...</span>
                        <span class="arrow">▾</span>
                    </div>

                    <div class="select-options" id="options-container">
                        <div class="search-box">
                            <input id="name-search" placeholder="search..." />
                        </div>

                        <div id="names-list"></div>
                    </div>

                </div>
            </div>

            <div id="step-2" class="auth-step">
                <h1 id="personal-greeting" class="title">hello!</h1>
                <p class="subtitle">verify yourself</p>

                <input type="password" id="password-input" placeholder="enter password">

                <button id="login-btn">play</button>

                <p id="error-msg" class="error-text"></p>
            </div>

        </div>
    </main>

    <!-- GAMES PAGE -->
    <div id="games-page" class="hidden">
        <header class="games-header">
            <div class="games-header-inner">

                <h1 class="games-title">🎓 Math<span>Tutor</span></h1>

                <div class="custom-select theme-dropdown" id="theme-dropdown">
                    <div class="select-trigger" id="theme-trigger">
                        <span id="theme-display">dark</span>
                        <span class="arrow">▾</span>
                    </div>
                    <div class="select-options theme-options" id="theme-options">
                        <div id="theme-list"></div>
                    </div>
                </div>

                <div class="games-header-right">
                    <span id="header-username"></span>
                    <button class="logout-btn" onclick="logout()">logout</button>
                </div>

            </div>
        </header>

        <div class="games-grid-wrapper">
            <div class="games-grid" id="games-grid"></div>
        </div>
    </div>

    <!-- GAME OVERLAY -->
    <div id="game-overlay" class="hidden">
        <div class="overlay-header">
            <button class="overlay-btn" id="overlay-close">← back</button>

            <span id="overlay-game-title"></span>

            <button class="overlay-btn" id="overlay-fullscreen">⛶ fullscreen</button>
        </div>

        <iframe id="game-iframe" allowfullscreen></iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
